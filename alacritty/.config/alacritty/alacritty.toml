[window]
padding = { x = 8, y = 8 }
decorations = "full"
opacity = 0.95
startup_mode = "Maximized"

[font]
size = 13.0

[font.normal]
family = "CaskaydiaMono Nerd Font"
style = "Regular"

[font.bold]
family = "CaskaydiaMono Nerd Font"
style = "Bold"

[font.italic]
family = "CaskaydiaMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 500

[scrolling]
history = 10000

[colors.primary]
background = "#011627"
foreground = "#acb4c2"

[colors.normal]
black   = "#1d3b53"
red     = "#fc514e"
green   = "#a1cd5e"
yellow  = "#e3d18a"
blue    = "#82aaff"
magenta = "#c792ea"
cyan    = "#7fdbca"
white   = "#a1aab8"

[colors.bright]
black   = "#7c8f8f"
red     = "#ff5874"
green   = "#21c7a8"
yellow  = "#ecc48d"
blue    = "#82aaff"
magenta = "#ae81ff"
cyan    = "#7fdbca"
white   = "#d6deeb"
