# reload config
unbind r
bind r source-file ~/.tmux.conf

set -g mouse on
set -s escape-time 0
set -g history-limit 10000
set -g renumber-windows on

# true color support
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# undercurl
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# prefix
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# windows and panes start at 1
set -g base-index 1
setw -g pane-base-index 1

# vi copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# open in current path
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# status bar
set -g status-position bottom
set -g status-style bg=colour235,fg=colour255
set -g status-left "#[fg=colour214,bold] #S "
set -g status-right "#[fg=colour255] %Y-%m-%d %H:%M "
set -g status-left-length 30
set -g window-status-current-format "#[fg=colour82,bold] #I:#W "
set -g window-status-format "#[fg=colour245] #I:#W "

set-option -g default-shell /bin/zsh

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
run '~/.tmux/plugins/tpm/tpm'
